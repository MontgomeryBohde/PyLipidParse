name: Deploy Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install mkdocs-material "mkdocstrings[python]>=0.20" pygoslin rdkit
      - run: mkdocs build --strict
      - name: Add Smithery server card
        run: |
          mkdir -p site/.well-known/mcp
          cat > site/.well-known/mcp/server-card.json << 'EOF'
          {
            "tools": [
              {
                "name": "lipid_to_smiles",
                "description": "Convert a lipid shorthand name to a canonical SMILES string. Requires full structural notation (e.g. 'PC 16:0/18:1(9Z)'), not species-level (e.g. 'PC 34:1').",
                "inputSchema": {
                  "type": "object",
                  "properties": {
                    "lipid_name": {
                      "type": "string",
                      "description": "Lipid in shorthand notation, e.g. 'PC 16:0/18:1(9Z)', 'FA 18:2(9Z,12Z)', 'Cer 18:1;O2/16:0'"
                    },
                    "dialect": {
                      "type": "string",
                      "description": "Parsing dialect: LipidMaps (default), Goslin, SwissLipids, HMDB",
                      "default": "LipidMaps"
                    }
                  },
                  "required": ["lipid_name"]
                }
              },
              {
                "name": "lipid_to_inchi",
                "description": "Convert a lipid shorthand name to an InChI string.",
                "inputSchema": {
                  "type": "object",
                  "properties": {
                    "lipid_name": {
                      "type": "string",
                      "description": "Lipid in shorthand notation, e.g. 'PC 16:0/18:1(9Z)'"
                    },
                    "dialect": {
                      "type": "string",
                      "description": "Parsing dialect: LipidMaps (default), Goslin, SwissLipids, HMDB",
                      "default": "LipidMaps"
                    }
                  },
                  "required": ["lipid_name"]
                }
              },
              {
                "name": "lipid_to_inchikey",
                "description": "Convert a lipid shorthand name to an InChIKey (27-character hash). Useful for database lookups in PubChem, LIPID MAPS, and ChEMBL.",
                "inputSchema": {
                  "type": "object",
                  "properties": {
                    "lipid_name": {
                      "type": "string",
                      "description": "Lipid in shorthand notation, e.g. 'PC 16:0/18:1(9Z)'"
                    },
                    "dialect": {
                      "type": "string",
                      "description": "Parsing dialect: LipidMaps (default), Goslin, SwissLipids, HMDB",
                      "default": "LipidMaps"
                    }
                  },
                  "required": ["lipid_name"]
                }
              },
              {
                "name": "batch_convert_lipids",
                "description": "Convert multiple lipid names to molecular identifiers in a single call. Errors for individual lipids are reported per-entry and do not abort the batch.",
                "inputSchema": {
                  "type": "object",
                  "properties": {
                    "lipid_names": {
                      "type": "array",
                      "items": {"type": "string"},
                      "description": "List of lipid names in shorthand notation"
                    },
                    "output_formats": {
                      "type": "array",
                      "items": {"type": "string", "enum": ["smiles", "inchi", "inchikey"]},
                      "description": "Which identifiers to compute. Defaults to ['smiles'].",
                      "default": ["smiles"]
                    },
                    "dialect": {
                      "type": "string",
                      "description": "Parsing dialect: LipidMaps (default), Goslin, SwissLipids, HMDB",
                      "default": "LipidMaps"
                    }
                  },
                  "required": ["lipid_names"]
                }
              },
              {
                "name": "lipid_to_mol_file",
                "description": "Convert a lipid shorthand name to MDL MOL file format (V2000) with 2D coordinates. Returns the file content as a string.",
                "inputSchema": {
                  "type": "object",
                  "properties": {
                    "lipid_name": {
                      "type": "string",
                      "description": "Lipid in shorthand notation, e.g. 'FA 18:1(9Z)'"
                    },
                    "dialect": {
                      "type": "string",
                      "description": "Parsing dialect: LipidMaps (default), Goslin, SwissLipids, HMDB",
                      "default": "LipidMaps"
                    },
                    "add_hydrogens": {
                      "type": "boolean",
                      "description": "If true, add explicit hydrogen atoms to the structure",
                      "default": false
                    }
                  },
                  "required": ["lipid_name"]
                }
              },
              {
                "name": "lipids_to_sdf",
                "description": "Convert multiple lipids to SDF (Structure Data File) format with 2D coordinates and embedded metadata. Returns the file content as a string.",
                "inputSchema": {
                  "type": "object",
                  "properties": {
                    "lipid_names": {
                      "type": "array",
                      "items": {"type": "string"},
                      "description": "List of lipid names in shorthand notation"
                    },
                    "dialect": {
                      "type": "string",
                      "description": "Parsing dialect: LipidMaps (default), Goslin, SwissLipids, HMDB",
                      "default": "LipidMaps"
                    },
                    "add_hydrogens": {
                      "type": "boolean",
                      "description": "If true, add explicit hydrogen atoms to all structures",
                      "default": false
                    }
                  },
                  "required": ["lipid_names"]
                }
              }
            ],
            "resources": [],
            "prompts": []
          }
          EOF
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
