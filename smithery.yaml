# Smithery registry configuration for pylipidparse MCP server
# See: https://smithery.ai
name: pylipidparse
description: >
  Convert lipid shorthand notation (LIPID MAPS, SwissLipids, HMDB, Goslin) to
  canonical SMILES, InChI, InChIKey, MOL files, and SDF files. Built on PyLipidParse
  and RDKit.

startCommand:
  type: stdio
  configSchema:
    type: object
    properties: {}
    additionalProperties: false
  commandFunction: |-
    (config) => ({
      command: "uvx",
      args: ["--from", "pylipidparse[mcp]", "pylipidparse-mcp"],
      env: {}
    })

tags:
  - chemistry
  - lipidomics
  - cheminformatics
  - smiles
  - rdkit
  - biology
  - bioinformatics

homepage: https://montgomerybohde.github.io/PyLipidParse
repository: https://github.com/MontgomeryBohde/PyLipidParse
license: MIT
